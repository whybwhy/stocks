<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>주식 매수종목 관리</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" href="/favicon.png"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex flex-col items-center justify-center px-4">
    <!-- 로딩 바 (카카오 로그인 클릭 시 표시) -->
    <div id="loginLoadingBar" class="fixed top-0 left-0 right-0 z-50 h-1 bg-transparent overflow-hidden hidden">
        <div class="h-full w-full origin-left animate-loading-bar bg-[#FEE500]"></div>
    </div>
    <div id="loginLoadingOverlay" class="fixed inset-0 z-40 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-2 border-[#FEE500] border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-200 text-sm">카카오 로그인 중...</p>
    </div>

    <main class="text-center max-w-lg w-full">
        <h1 class="text-2xl sm:text-4xl font-bold text-white mb-2 tracking-tight">주식 매수종목 관리</h1>
        <p class="text-slate-400 text-base sm:text-lg mb-8 sm:mb-12">종목별 1·2·3차 매수가를 기록하고 관리하세요</p>

        <div th:if="${loginError == 'forbidden'}" class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-200 text-sm">
            <p>chartboy 페이지 접근 권한이 없습니다. 허용된 카카오 계정만 이용할 수 있습니다.</p>
        </div>
        <div th:if="${loginError == 'rate_limit'}" class="mb-6 p-4 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-200 text-sm">
            <p class="mb-2">10분간 로그인 요청이 20번을 초과하여 10분 뒤 시도해주세요.</p>
            <a href="https://developers.kakao.com/docs/latest/ko/getting-started/quota#rate-limit" target="_blank" rel="noopener noreferrer" class="underline hover:text-amber-100">카카오 쿼터·요청 수 제한 안내</a>
        </div>

        <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-xl">
            <p class="text-slate-300 text-sm mb-6">시작하려면 카카오 계정으로 로그인하세요.</p>
            <a id="kakaoLoginBtn" th:href="@{/oauth2/authorization/kakao}"
               href="/oauth2/authorization/kakao"
               class="inline-flex items-center justify-center gap-3 w-full py-4 px-6 rounded-xl bg-[#FEE500] hover:bg-[#FADA0A] text-[#191919] font-semibold text-base transition shadow-lg hover:shadow-[#FEE500]/20 cursor-pointer select-none"
               role="button">
                <svg class="w-6 h-6 shrink-0 pointer-events-none" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 3c5.799 0 10.5 3.664 10.5 8.185 0 4.52-4.701 8.184-10.5 8.184a13.5 13.5 0 0 1-1.727-.11l-4.408 2.883c-.501.265-.678.236-.472-.413l.892-3.678c-2.88-1.46-4.785-3.99-4.785-6.866C1.5 6.665 6.201 3 12 3Z"/>
                </svg>
                <span>카카오 로그인</span>
            </a>
        </div>

        <p class="text-slate-500 text-xs mt-8">로그인 시 서비스 이용약관 및 개인정보 처리방침에 동의하게 됩니다.</p>
    </main>
    <script>
        (function() {
            var btn = document.getElementById('kakaoLoginBtn');
            var bar = document.getElementById('loginLoadingBar');
            var overlay = document.getElementById('loginLoadingOverlay');
            if (btn && bar && overlay) {
                btn.addEventListener('click', function() {
                    bar.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                });
            }
        })();
    </script>
    <style>
        @keyframes loading-bar {
            0% { transform: scaleX(0); }
            40% { transform: scaleX(0.6); }
            100% { transform: scaleX(1); }
        }
        .animate-loading-bar {
            animation: loading-bar 1.5s ease-in-out infinite;
        }
    </style>
</body>
</html>
