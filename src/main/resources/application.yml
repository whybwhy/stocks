server:
  port: ${PORT:8080}

spring:
  application:
    name: stocks
  # 로컬 실행 시 프로파일 미지정이면 local → application-local.yml 이 적용됨. Render 등에서는 SPRING_PROFILES_ACTIVE=prod 등으로 지정.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    time-zone: Asia/Seoul

  mvc:
    time-zone: Asia/Seoul
    # 매핑되지 않은 URL 요청 시 NoHandlerFoundException 발생 → 404 페이지 출력
    throw-exception-if-no-handler-found: true
  web:
    resources:
      # 기본 /** 정적 매핑 비활성화 → 없는 경로는 NoHandlerFoundException으로 404 페이지 표시
      add-mappings: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-name: Kakao
            # 로컬: KAKAO_REDIRECT_URI 미설정 시 {baseUrl} → http://localhost:8080
            redirect-uri: "${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# /stock/chartboy 접근 허용 카카오 계정(닉네임). 비어 있으면 모든 인증 사용자 허용. 아래에 추가하면 해당 닉네임만 접근 가능.
app:
  allowed-kakao-accounts: ["30_윤보람", "김효진"]
  # allowed-kakao-accounts: [ "닉네임1", "닉네임2" ]

supabase:
  url: ${SUPABASE_URL:}
  anon-key: ${SUPABASE_ANON_KEY:}

